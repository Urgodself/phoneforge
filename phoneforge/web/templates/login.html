<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>PHONEFORGE — login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0a0a0a; color: #e5e5e5; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    input { background: #141414; border: 1px solid #262626; color: #e5e5e5; padding: .55rem .75rem; border-radius: .25rem; }
    input:focus { outline: none; border-color: #00ff88; }
    .btn { display:inline-block; padding: .55rem .85rem; border-radius: .375rem; background: #00ff88; color: #0a0a0a; font-weight: 600; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center">
  <div class="w-80">
    <div class="text-center text-2xl font-bold tracking-widest text-[#00ff88] mb-8">PHONEFORGE</div>
    {% if error %}
    <div class="mb-4 px-3 py-2 rounded border border-red-800 bg-red-950 text-red-300 text-sm">
      Invalid PIN.
    </div>
    {% endif %}
    <form method="post" action="/login" class="space-y-4">
      <input type="password" name="pin" inputmode="numeric" autocomplete="off" autofocus
             pattern="[0-9]{1,12}" maxlength="12"
             class="w-full text-center text-xl tracking-widest"
             placeholder="PIN" required>
      <button type="submit" class="btn w-full">unlock</button>
    </form>
    <div class="mt-6 text-center text-[#7a7a7a] text-xs">single-user&nbsp;&middot;&nbsp;PIN protected</div>
  </div>
</body>
</html>
